<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Loader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    /* ─────────────────────────────────────────
       DESIGN TOKENS — tweak everything here
    ───────────────────────────────────────── */
    :root {
      --loader-size:    72px;          /* overall diameter          */
      --loader-accent:  #2563eb;       /* primary brand color       */
      --loader-bg:      transparent;   /* container background      */
      --loader-speed:   1.8s;          /* one full cycle duration   */
      --loader-track:   rgba(37,99,235,.12);  /* ring track color   */
      --loader-glow:    rgba(37,99,235,.35);  /* subtle glow spread */
      --stroke-width:   3px;           /* ring stroke weight        */
    }

    /* ─────────────────────────────────────────
       PAGE SHELL — demo only
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 80px;
      flex-wrap: wrap;
      padding: 60px 40px;
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
    }

    /* Demo tile */
    .demo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .demo-label {
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #64748b;
      font-weight: 400;
    }

    /* Light surface variant */
    .surface-light {
      background: #f8fafc;
      border-radius: 20px;
      padding: 44px 52px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 32px rgba(0,0,0,.08);
    }
    .surface-light .demo-label { color: #94a3b8; }

    /* ─────────────────────────────────────────
       LOADER WRAPPER
    ───────────────────────────────────────── */
    .loader-wrap {
      width:  var(--loader-size);
      height: var(--loader-size);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--loader-bg);
      /* Fade-in entrance */
      animation: loaderEnter .5s cubic-bezier(.22,1,.36,1) both;
    }

    /* ─────────────────────────────────────────
       SVG SIZING
    ───────────────────────────────────────── */
    .loader-svg {
      width:  100%;
      height: 100%;
      overflow: visible;       /* lets glow bleed outside viewBox */
    }

    /* ─────────────────────────────────────────
       TRACK RING — static, barely visible
    ───────────────────────────────────────── */
    .loader-track {
      fill: none;
      stroke: var(--loader-track);
      stroke-width: var(--stroke-width);
    }

    /* ─────────────────────────────────────────
       PROGRESS ARC — animated accent stroke
    ───────────────────────────────────────── */
    .loader-arc {
      fill: none;
      stroke: var(--loader-accent);
      stroke-width: var(--stroke-width);
      stroke-linecap: round;
      /* circumference of r=44 circle ≈ 276.46 */
      stroke-dasharray: 276.46;
      stroke-dashoffset: 276.46;
      transform-origin: center;
      transform: rotate(-90deg);

      /* Glow — layered filter for a luminous edge */
      filter:
        drop-shadow(0 0  4px var(--loader-glow))
        drop-shadow(0 0 10px var(--loader-glow));

      animation: arcSpin var(--loader-speed) cubic-bezier(.6,0,.4,1) infinite;
    }

    /* ─────────────────────────────────────────
       CENTRE DOT — tiny pulse instead of arrows
    ───────────────────────────────────────── */
    .loader-dot {
      fill: var(--loader-accent);
      transform-origin: center;
      animation: dotPulse var(--loader-speed) ease-in-out infinite;
      opacity: .9;
    }

    /* ─────────────────────────────────────────
       OUTER HALO — very faint, slow counter-spin
    ───────────────────────────────────────── */
    .loader-halo {
      fill: none;
      stroke: var(--loader-accent);
      stroke-width: 1px;
      stroke-linecap: round;
      stroke-dasharray: 12 50;
      opacity: .18;
      transform-origin: center;
      animation: haloSpin calc(var(--loader-speed) * 3) linear infinite reverse;
    }

    /* ─────────────────────────────────────────
       KEYFRAMES
    ───────────────────────────────────────── */

    /* Arc sweeps from 0 → ~75% → 0, rotating the whole stroke */
    @keyframes arcSpin {
      0%   {
        stroke-dashoffset: 248;   /* small leading stub */
        transform: rotate(-90deg);
      }
      45%  {
        stroke-dashoffset: 69;    /* arc at ~75% of circle */
      }
      100% {
        stroke-dashoffset: 248;
        transform: rotate(270deg);/* full 360° + start offset */
      }
    }

    /* Centre dot breathes with the cycle */
    @keyframes dotPulse {
      0%, 100% { r: 2.5px; opacity: .7; }
      50%       { r: 3.5px; opacity: 1; }
    }

    /* Halo drifts slowly */
    @keyframes haloSpin {
      from { transform: rotate(0deg);   }
      to   { transform: rotate(360deg); }
    }

    /* Entrance fade + scale */
    @keyframes loaderEnter {
      from { opacity: 0; transform: scale(.85); }
      to   { opacity: 1; transform: scale(1);   }
    }

    /* ─────────────────────────────────────────
       SIZE VARIANTS (CSS-variable overrides)
    ───────────────────────────────────────── */
    .loader--sm { --loader-size: 40px; --stroke-width: 2.5px; }
    .loader--md { --loader-size: 72px; }   /* default */
    .loader--lg { --loader-size: 120px; --stroke-width: 2px; }

    /* ─────────────────────────────────────────
       COLOUR VARIANTS (accent overrides)
    ───────────────────────────────────────── */
    .loader--indigo  { --loader-accent: #6366f1; --loader-glow: rgba(99,102,241,.35); --loader-track: rgba(99,102,241,.12); }
    .loader--emerald { --loader-accent: #10b981; --loader-glow: rgba(16,185,129,.35); --loader-track: rgba(16,185,129,.12); }
    .loader--slate   { --loader-accent: #94a3b8; --loader-glow: rgba(148,163,184,.2); --loader-track: rgba(148,163,184,.10); }
  </style>
</head>
<body>

  <!-- ── DARK BACKGROUND DEMOS ─────────────────── -->

  <div class="demo">
    <div class="loader-wrap loader--sm">
      <svg class="loader-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Loading" role="img">
        <circle class="loader-track" cx="50" cy="50" r="44"/>
        <circle class="loader-halo"  cx="50" cy="50" r="44"/>
        <circle class="loader-arc"   cx="50" cy="50" r="44"/>
        <circle class="loader-dot"   cx="50" cy="50" r="2.5"/>
      </svg>
    </div>
    <span class="demo-label">Small · #2563eb</span>
  </div>

  <div class="demo">
    <div class="loader-wrap loader--md">
      <svg class="loader-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Loading" role="img">
        <circle class="loader-track" cx="50" cy="50" r="44"/>
        <circle class="loader-halo"  cx="50" cy="50" r="44"/>
        <circle class="loader-arc"   cx="50" cy="50" r="44"/>
        <circle class="loader-dot"   cx="50" cy="50" r="2.5"/>
      </svg>
    </div>
    <span class="demo-label">Default · Blue</span>
  </div>

  <div class="demo">
    <div class="loader-wrap loader--lg loader--indigo">
      <svg class="loader-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Loading" role="img">
        <circle class="loader-track" cx="50" cy="50" r="44"/>
        <circle class="loader-halo"  cx="50" cy="50" r="44"/>
        <circle class="loader-arc"   cx="50" cy="50" r="44"/>
        <circle class="loader-dot"   cx="50" cy="50" r="2.5"/>
      </svg>
    </div>
    <span class="demo-label">Large · Indigo</span>
  </div>

  <div class="demo">
    <div class="loader-wrap loader--md loader--emerald">
      <svg class="loader-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Loading" role="img">
        <circle class="loader-track" cx="50" cy="50" r="44"/>
        <circle class="loader-halo"  cx="50" cy="50" r="44"/>
        <circle class="loader-arc"   cx="50" cy="50" r="44"/>
        <circle class="loader-dot"   cx="50" cy="50" r="2.5"/>
      </svg>
    </div>
    <span class="demo-label">Default · Emerald</span>
  </div>

  <!-- ── LIGHT SURFACE DEMO ─────────────────────── -->

  <div class="demo surface-light">
    <div class="loader-wrap loader--md loader--slate" style="--loader-accent:#2563eb;--loader-glow:rgba(37,99,235,.2);--loader-track:rgba(37,99,235,.08);">
      <svg class="loader-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-label="Loading" role="img">
        <circle class="loader-track" cx="50" cy="50" r="44"/>
        <circle class="loader-halo"  cx="50" cy="50" r="44"/>
        <circle class="loader-arc"   cx="50" cy="50" r="44"/>
        <circle class="loader-dot"   cx="50" cy="50" r="2.5"/>
      </svg>
    </div>
    <span class="demo-label" style="color:#94a3b8;">Light surface</span>
  </div>

</body>
</html>
